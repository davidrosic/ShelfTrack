version: "3.8"

services:
  postgres-test:
    image: postgres:17-alpine
    container_name: shelftrack-postgres-test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: shelftrack_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d shelftrack_test"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
